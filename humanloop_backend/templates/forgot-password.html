<!DOCTYPE html>
{% load static %}
<html lang="en" data-theme="system">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HumanLoop</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="{% static 'script.js' %}"></script>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{% url 'index' %}" class="brand">
                <svg class="brand-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M25 20V80M25 50H55C65 50 75 55 75 65V70C75 75 70 80 65 80H45" class="logo-stroke-blue"
                        stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M55 20V50" class="logo-stroke-blue" stroke-width="10" stroke-linecap="round" />
                    <path d="M75 40V25C75 20 70 15 65 15" class="logo-stroke-teal" stroke-width="10"
                        stroke-linecap="round" />
                    <circle cx="75" cy="40" r="5" class="logo-fill-teal" />
                </svg>
                <span class="brand-text">Human<span class="brand-accent">Loop</span></span>
            </a>

            <button class="mobile-toggle"><i class="fa-solid fa-bars"></i></button>

            <div class="nav-links"></div>

            <div class="nav-actions">
                <div class="theme-toggle">
                    <button data-theme-set="light" title="Light"><i class="fa-solid fa-sun"></i></button>
                    <button data-theme-set="dark" title="Dark"><i class="fa-solid fa-moon"></i></button>
                    <button data-theme-set="system" title="System" class="active"><i
                            class="fa-solid fa-desktop"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="auth-container">
        <div class="auth-card card" id="forgotCard">
            <div class="auth-header">
                <div class="auth-icon-wrapper">
                    <i class="fa-solid fa-envelope-open-text"></i>
                </div>
                <h2>Forgot Password</h2>
                <p>Enter your email address and we'll send you a verification code.</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-field" placeholder="name@organization.org" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="sendOtpBtn">
                    <i class="fa-solid fa-paper-plane icon-margin-right"></i>Send Verification Code
                </button>
            </form>

            <div class="auth-footer">
                <p class="auth-secure-text">
                    <a href="{% url 'login' %}" class="link-primary"><i class="fa-solid fa-arrow-left"
                            style="margin-right:0.3rem;"></i>Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('sendOtpBtn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

            // Show or create error element
            let errorEl = document.getElementById('forgot-error');
            if (!errorEl) {
                errorEl = document.createElement('div');
                errorEl.id = 'forgot-error';
                errorEl.style.cssText = 'color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;font-size:0.875rem;margin-bottom:1rem;display:none;';
                document.getElementById('forgotForm').prepend(errorEl);
            }
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/send-otp/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    sessionStorage.setItem('resetEmail', email);
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> OTP Sent!';
                    btn.style.background = '#0D9488';
                    setTimeout(() => {
                        window.location.href = '{% url "verify_otp" %}';
                    }, 800);
                } else {
                    errorEl.textContent = data.error || 'Failed to send OTP. Please try again.';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane icon-margin-right"></i>Send Verification Code';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please check your connection.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane icon-margin-right"></i>Send Verification Code';
            }
        });
    </script>


    <script>
        // Django-injected user data
        window.__USER__ = {{ user_json|safe }};
    </script>
</body>

</html>
